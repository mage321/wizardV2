<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mage - Discord Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Starry Background -->
    <div class="background">
        <div class="stars"></div>
        <div class="trees"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-picture">
                    <img src="https://cdn.discordapp.com/attachments/1300281383813386343/1482147068100481315/IMG_0564.jpg?ex=69b5e485&is=69b49305&hm=d0562c2456ff071afaa7cf27a441d196a46bda22cf65c7f5a04e90a1ee25e96a&" alt="Profile Picture" class="profile-img">
                    <div class="status-indicator online"></div>
                </div>
                <div class="profile-info">
                    <h1 class="username">Mage <span class="discriminant">7uk</span></h1>
                    <p class="status-message">i love jesus and god and they both love you to</p>
                    <div class="badges">
                        <span class="badge">&lt;/&gt;</span>
                    </div>
                </div>
            </div>
            
            <div class="social-links">
                <a href="https://discord.com/users/7uk._." target="_blank" class="social-link">
                    <i class="fab fa-discord"></i>
                </a>
            </div>
            
            <div class="stats">
                <div class="view-count">
                    <i class="fas fa-eye"></i>
                    <span id="visitor-count">60,234</span>
                </div>
            </div>
        </div>

        <!-- View Results Button -->
        <div class="top-controls">
            <button id="results-button" class="results-btn">View Results</button>
        </div>

        <!-- Audio Controls -->
        <div class="audio-controls">
            <div class="volume-control">
                <i class="fas fa-volume-up volume-icon"></i>
                <input type="range" id="volume-slider" class="slider" min="0" max="100" value="30">
            </div>
            <div class="transparency-control">
                <i class="fas fa-eye transparency-icon"></i>
                <input type="range" id="transparency-slider" class="slider" min="0" max="100" value="70">
            </div>
        </div>
    </div>

    <!-- Background Audio -->
    <audio id="background-music" loop autoplay playsinline>
        <source src="background-music.mp4.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script src="script.js"></script>
</body>
</html>
